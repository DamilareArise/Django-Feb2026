{% extends "common.html" %} 
{% load static %} 
{% block content %}
{% load crispy_forms_tags %}
    <div class="col-11 col-md-4 m-auto border p-3 my-3 rounded">
        <h3 class="text-center my-2">Login</h3>
        <form method="post">
            {% csrf_token %}
            {{form|crispy}}
            
            <button class="btn btn-primary w-100 ">Login</button>
            <p><a href="{% url "password_reset" %}" class="text-dark">Forgot password?</a></p>
        </form>
    </div>

{% endblock %}
