{% extends "common.html" %} 
{% load static %} 
{% block content %}
{% load crispy_forms_tags %}
    <div class="col-11 col-md-4 m-auto border p-3 my-3 rounded">
        <h3 class="text-center my-2">Password reset</h3>
        <p>Forgotten your password? Enter your email address below, and we’ll email instructions for setting a new one.</p>
        <form method="post">
            {% csrf_token %}
            {{form|crispy}}
            
            <button class="btn btn-primary w-100 ">Send</button>
        </form>
    </div>

{% endblock %}
