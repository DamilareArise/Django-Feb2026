{% extends "common.html" %} 
{% load static %} 
{% block content %}
{% load crispy_forms_tags %}
    <div class="col-11 col-md-4 m-auto border p-3 my-3 rounded">
        <h3 class="text-center my-2">Password reset confirmation</h3>
        <p>Please enter your new password twice so we can verify you typed it in correctly.</p>
        <form method="post">
            {% csrf_token %}
            {{form|crispy}}
            
            <button class="btn btn-primary w-100 ">Change</button>
        </form>
    </div>

{% endblock %}
