{% extends "common.html" %} 
{% load static %} 
{% block content %}
{% load crispy_forms_tags %}
    <div class="col-11 col-md-4 m-auto border p-3 my-3">
        <h3 class="text-center my-2">{{action|default:"Create"}} Post</h3>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{form|crispy}}
            
            <button class="btn btn-primary">Submit</button>
        </form>
    </div>

{% endblock %}
